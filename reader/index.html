<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d10">
  <title>Wenyi 阅读器</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d10;
      --surface: #14171c;
      --surface-2: #1b1f26;
      --text: #f2f3f5;
      --muted: #9ca3ad;
      --line: #2a3039;
      --accent: #9fc2ff;
      --good: #79d6a3;
      --warn: #f2c879;
      --bad: #ff8e8e;
      --font-size: 19px;
      --line-height: 1.95;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, select {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 11px;
      background: var(--surface-2);
      color: var(--text);
      font: inherit;
    }
    button { padding: 0 14px; cursor: pointer; }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: .42; cursor: default; }
    button.primary { border-color: #486b9c; background: #23466f; }

    .topbar {
      position: sticky;
      z-index: 10;
      top: 0;
      padding: max(10px, env(safe-area-inset-top)) 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(11, 13, 16, .94);
      backdrop-filter: blur(12px);
    }
    .topbar-inner { max-width: 820px; margin: 0 auto; }
    .book-title {
      margin: 0 0 8px;
      overflow: hidden;
      color: var(--text);
      font-size: 15px;
      font-weight: 650;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .status-row, .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-row { margin-bottom: 9px; overflow-x: auto; scrollbar-width: none; }
    .status-row::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .chip.good { border-color: #285b40; color: var(--good); }
    .chip.warn { border-color: #675527; color: var(--warn); }
    .chip.bad { border-color: #6c3333; color: var(--bad); }
    #chapter-select { min-width: 0; flex: 1 1 auto; padding: 0 10px; }
    #refresh-button { flex: 0 0 88px; padding-inline: 10px; white-space: nowrap; }
    .icon-button { flex: 0 0 44px; padding: 0; font-size: 18px; }

    main { width: min(100%, 820px); margin: 0 auto; padding: 26px 19px 120px; }
    .chapter-header { margin-bottom: 28px; text-align: center; }
    .chapter-header h1 {
      margin: 0 0 11px;
      font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
      font-size: clamp(22px, 6vw, 32px);
      line-height: 1.4;
    }
    .chapter-meta { color: var(--muted); font-size: 13px; }
    .compare-toggle {
      min-height: 36px;
      margin-top: 14px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .compare-toggle.active { border-color: #486b9c; color: var(--accent); }
    .reader-content {
      font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
      font-size: var(--font-size);
      line-height: var(--line-height);
      letter-spacing: .02em;
      overflow-wrap: anywhere;
    }
    .reader-content p { margin: 0 0 1.18em; text-align: justify; text-justify: inter-ideograph; }
    .reader-content h2 {
      margin: 2.2em 0 1em;
      color: var(--text);
      font-size: 1.18em;
      line-height: 1.5;
      text-align: center;
    }
    .source-text {
      display: none;
      margin: -.45em 0 1.45em !important;
      padding-left: 12px;
      border-left: 2px solid var(--line);
      color: var(--muted);
      font-family: "Noto Serif JP", "Yu Mincho", "Meiryo", serif;
      font-size: .78em;
      line-height: 1.75;
      text-align: left !important;
    }
    body.show-source .source-text { display: block; }
    .source-heading { margin-top: -1.2em !important; text-align: center !important; }
    .waiting {
      margin: 42px 0;
      padding: 22px 18px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
    }
    .bottom-nav { display: flex; gap: 10px; margin-top: 48px; }
    .bottom-nav button { flex: 1; }
    .notice {
      position: fixed;
      z-index: 20;
      right: 14px;
      bottom: max(16px, env(safe-area-inset-bottom));
      left: 14px;
      max-width: 520px;
      margin: auto;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #1a1f26;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      color: var(--text);
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: .2s ease;
    }
    .notice.show { opacity: 1; transform: translateY(0); }
    .loading { opacity: .58; }

    @media (min-width: 700px) {
      .topbar { padding-inline: 24px; }
      main { padding-inline: 56px; }
      .book-title { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <p id="book-title" class="book-title">正在连接 Wenyi 状态……</p>
      <div class="status-row" aria-label="翻译状态">
        <span id="translation-chip" class="chip">翻译 --/--</span>
        <span id="segment-chip" class="chip">段落 --%</span>
        <span id="review-chip" class="chip">审校 --/--</span>
        <span id="updated-chip" class="chip">尚未查询</span>
      </div>
      <div class="control-row">
        <button id="prev-button" class="icon-button" type="button" aria-label="上一章">‹</button>
        <select id="chapter-select" aria-label="选择章节"></select>
        <button id="next-button" class="icon-button" type="button" aria-label="下一章">›</button>
        <button id="refresh-button" class="primary" type="button">立即查询</button>
        <button id="font-button" class="icon-button" type="button" aria-label="调整字号">Aa</button>
      </div>
    </div>
  </header>

  <main id="main">
    <section class="chapter-header">
      <h1 id="chapter-title">载入中</h1>
      <div id="chapter-meta" class="chapter-meta"></div>
      <button id="compare-button" class="compare-toggle" type="button" aria-pressed="false">显示原文</button>
    </section>
    <article id="reader-content" class="reader-content" aria-live="polite"></article>
    <nav class="bottom-nav" aria-label="章节导航">
      <button id="bottom-prev" type="button">上一章</button>
      <button id="bottom-next" type="button">下一章</button>
    </nav>
  </main>
  <div id="notice" class="notice" role="status"></div>

  <script>
    const POLL_INTERVAL_MS = 60_000;
    const FONT_SIZES = [17, 19, 21, 23];
    const state = {
      book: null,
      chapter: null,
      chapterIndex: Number(localStorage.getItem("wenyi.chapter")),
      fontIndex: Number(localStorage.getItem("wenyi.font")) || 1,
      showSource: localStorage.getItem("wenyi.show-source") === "1",
      querying: false,
    };

    const $ = (id) => document.getElementById(id);
    const elements = {
      main: $("main"), bookTitle: $("book-title"), translation: $("translation-chip"),
      segment: $("segment-chip"), review: $("review-chip"), updated: $("updated-chip"),
      select: $("chapter-select"), prev: $("prev-button"), next: $("next-button"),
      bottomPrev: $("bottom-prev"), bottomNext: $("bottom-next"), refresh: $("refresh-button"),
      font: $("font-button"), chapterTitle: $("chapter-title"), chapterMeta: $("chapter-meta"),
      compare: $("compare-button"), content: $("reader-content"), notice: $("notice"),
    };

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      })[char]);
    }

    function showNotice(message) {
      elements.notice.textContent = message;
      elements.notice.classList.add("show");
      clearTimeout(showNotice.timer);
      showNotice.timer = setTimeout(() => elements.notice.classList.remove("show"), 2400);
    }

    function formatTime(value) {
      if (!value) return "未知";
      return new Intl.DateTimeFormat("zh-CN", { hour: "2-digit", minute: "2-digit" })
        .format(new Date(value));
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`请求失败：${response.status}`);
      return response.json();
    }

    function updateFont() {
      state.fontIndex = ((state.fontIndex % FONT_SIZES.length) + FONT_SIZES.length) % FONT_SIZES.length;
      document.documentElement.style.setProperty("--font-size", `${FONT_SIZES[state.fontIndex]}px`);
      localStorage.setItem("wenyi.font", String(state.fontIndex));
    }

    function updateCompareMode() {
      document.body.classList.toggle("show-source", state.showSource);
      elements.compare.classList.toggle("active", state.showSource);
      elements.compare.textContent = state.showSource ? "隐藏原文" : "显示原文";
      elements.compare.setAttribute("aria-pressed", String(state.showSource));
      localStorage.setItem("wenyi.show-source", state.showSource ? "1" : "0");
    }

    function renderStatus() {
      const book = state.book;
      elements.bookTitle.textContent = book.title;
      elements.translation.textContent = `翻译 ${book.done_chapters}/${book.chapter_count}`;
      elements.translation.className = `chip ${book.translation_complete ? "good" : "warn"}`;
      const percent = book.total_segments
        ? Math.floor(book.translated_segments / book.total_segments * 100)
        : 0;
      elements.segment.textContent = `段落 ${percent}%`;
      elements.segment.className = `chip ${percent === 100 ? "good" : ""}`;
      elements.review.textContent = book.review_complete
        ? `审校完成 ${book.review_done_chapters}/${book.chapter_count}`
        : `未审校 ${book.review_done_chapters}/${book.chapter_count}`;
      elements.review.className = `chip ${book.review_complete ? "good" : ""}`;
      if (book.review_failed_chapters) {
        elements.review.textContent += ` · 失败 ${book.review_failed_chapters}`;
        elements.review.className = "chip bad";
      }
      elements.updated.textContent = `查询 ${formatTime(new Date())}`;
    }

    function chooseInitialChapter() {
      const chapters = state.book.chapters;
      if (!chapters.some((chapter) => chapter.index === state.chapterIndex)) {
        const available = chapters.filter((chapter) => chapter.translated_segments > 0);
        state.chapterIndex = available.length ? available[available.length - 1].index : chapters[0]?.index;
      }
    }

    function renderChapterOptions() {
      const previousValue = String(state.chapterIndex);
      elements.select.innerHTML = state.book.chapters.map((chapter) => {
        const marker = chapter.status === "done" ? "✓" : chapter.translated_segments ? "…" : "·";
        return `<option value="${chapter.index}">${marker} ${escapeHtml(chapter.title)}</option>`;
      }).join("");
      elements.select.value = previousValue;
    }

    function updateNavButtons() {
      const indexes = state.book.chapters.map((chapter) => chapter.index);
      const position = indexes.indexOf(state.chapterIndex);
      const atStart = position <= 0;
      const atEnd = position < 0 || position >= indexes.length - 1;
      elements.prev.disabled = atStart;
      elements.bottomPrev.disabled = atStart;
      elements.next.disabled = atEnd;
      elements.bottomNext.disabled = atEnd;
    }

    function renderChapter() {
      const chapter = state.chapter;
      elements.chapterTitle.textContent = chapter.title;
      const reviewText = chapter.review_status === "done" ? "已审校" : "未审校";
      elements.chapterMeta.textContent = `${chapter.translated_segments}/${chapter.total_segments} 段 · ${reviewText} · 更新 ${formatTime(chapter.updated_at)}`;
      const translated = chapter.segments.filter((segment) => segment.translated);
      const html = translated.map((segment) => {
        const text = escapeHtml(segment.target).replace(/\n/g, "<br>");
        const source = escapeHtml(segment.source).replace(/\n/g, "<br>");
        return segment.kind === "heading"
          ? `<section class="segment-pair"><h2>${text}</h2><div class="source-text source-heading" lang="ja">${source}</div></section>`
          : `<div class="segment-pair"><p>${text}</p><p class="source-text" lang="ja">${source}</p></div>`;
      }).join("");
      const waiting = chapter.translated_segments < chapter.total_segments
        ? `<div class="waiting">本章仍在翻译：${chapter.translated_segments}/${chapter.total_segments} 段<br>可点击“立即查询”，或等待每分钟自动查询。</div>`
        : "";
      elements.content.innerHTML = html || `<div class="waiting">本章尚未产生译文。</div>`;
      if (html && waiting) elements.content.insertAdjacentHTML("beforeend", waiting);
      document.title = `${chapter.title} · Wenyi 阅读器`;
      updateNavButtons();
    }

    async function loadChapter(index, { preserveScroll = false } = {}) {
      const oldScroll = window.scrollY;
      state.chapterIndex = Number(index);
      localStorage.setItem("wenyi.chapter", String(state.chapterIndex));
      elements.select.value = String(state.chapterIndex);
      state.chapter = await fetchJson(`/api/chapters/${state.chapterIndex}`);
      renderChapter();
      if (preserveScroll) {
        requestAnimationFrame(() => window.scrollTo({ top: oldScroll, behavior: "instant" }));
      } else {
        window.scrollTo({ top: 0, behavior: "instant" });
      }
    }

    async function queryUpdates({ manual = false } = {}) {
      if (state.querying) return;
      state.querying = true;
      elements.refresh.disabled = true;
      elements.refresh.textContent = "查询中";
      elements.main.classList.add("loading");
      try {
        const previous = state.book?.chapters.find((chapter) => chapter.index === state.chapterIndex);
        state.book = await fetchJson("/api/book");
        chooseInitialChapter();
        renderStatus();
        renderChapterOptions();
        const current = state.book.chapters.find((chapter) => chapter.index === state.chapterIndex);
        if (!state.chapter || !previous || current?.revision !== previous.revision) {
          await loadChapter(state.chapterIndex, { preserveScroll: Boolean(state.chapter) });
        } else {
          updateNavButtons();
        }
        if (manual) showNotice("已查询最新翻译与审校状态");
      } catch (error) {
        showNotice(error.message || "查询失败");
      } finally {
        state.querying = false;
        elements.refresh.disabled = false;
        elements.refresh.textContent = "立即查询";
        elements.main.classList.remove("loading");
      }
    }

    function moveChapter(offset) {
      const indexes = state.book.chapters.map((chapter) => chapter.index);
      const position = indexes.indexOf(state.chapterIndex);
      const nextIndex = indexes[position + offset];
      if (nextIndex !== undefined) loadChapter(nextIndex);
    }

    elements.select.addEventListener("change", () => loadChapter(elements.select.value));
    elements.prev.addEventListener("click", () => moveChapter(-1));
    elements.next.addEventListener("click", () => moveChapter(1));
    elements.bottomPrev.addEventListener("click", () => moveChapter(-1));
    elements.bottomNext.addEventListener("click", () => moveChapter(1));
    elements.refresh.addEventListener("click", () => queryUpdates({ manual: true }));
    elements.compare.addEventListener("click", () => {
      state.showSource = !state.showSource;
      updateCompareMode();
    });
    elements.font.addEventListener("click", () => {
      state.fontIndex = (state.fontIndex + 1) % FONT_SIZES.length;
      updateFont();
      showNotice(`正文字号 ${FONT_SIZES[state.fontIndex]}px`);
    });

    updateFont();
    updateCompareMode();
    queryUpdates();
    setInterval(queryUpdates, POLL_INTERVAL_MS);
  </script>
</body>
</html>
